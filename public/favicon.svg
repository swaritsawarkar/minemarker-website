<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#060608"/>
  <g fill="#e8ff47">
    <!-- Pixelated crosshair / mark symbol -->
    <rect x="28" y="8" width="8" height="8"/>
    <rect x="28" y="48" width="8" height="8"/>
    <rect x="8" y="28" width="8" height="8"/>
    <rect x="48" y="28" width="8" height="8"/>
    <!-- Center block -->
    <rect x="24" y="24" width="16" height="16" rx="2"/>
    <!-- Corner accent pixels -->
    <rect x="16" y="16" width="4" height="4" opacity="0.4"/>
    <rect x="44" y="16" width="4" height="4" opacity="0.4"/>
    <rect x="16" y="44" width="4" height="4" opacity="0.4"/>
    <rect x="44" y="44" width="4" height="4" opacity="0.4"/>
  </g>
</svg>
